name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # PLAN.md section 3.1: "a CI test imports `airlock` with extras uninstalled
  # to enforce the import-light core". This job is the environment where a
  # stray module-level sqlalchemy/httpx import in ANY base module fails hard —
  # the postgres job below can never catch that, because extras are installed
  # there.
  core-import-light:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (dev group, NO extras)
        run: uv sync --locked

      - name: Assert extras are really absent
        run: |
          if uv run python -c "import sqlalchemy" 2>/dev/null; then
            echo "sqlalchemy is installed — this job must run without extras"; exit 1
          fi
          if uv run python -c "import httpx" 2>/dev/null; then
            echo "httpx is installed — this job must run without extras"; exit 1
          fi

      - name: Import-light guard + package-surface tests (core deps only)
        run: uv run pytest tests/test_scaffold.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: airlock
          POSTGRES_PASSWORD: airlock
          POSTGRES_DB: airlock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://airlock:airlock@localhost:5432/airlock_test
      # Select the derandomized Hypothesis "ci" profile (tests/conftest.py):
      # derandomize=True + a fixed max_examples + deadline=None, so a red
      # property run is a REAL bug and never dice (PLAN.md 7 / P1.4 deliverable 4).
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The postgres extra runs the ledger suite against the postgres:16
      # service; the http extra (httpx) runs the P3.4 HttpApprovalTransport
      # suite against a fake in-process control plane (httpx.MockTransport). The
      # extras-UNINSTALLED enforcement of the import-light core (base import and
      # the httpx-free webhook receiver) lives in the core-import-light job above.
      - name: Sync dependencies (dev group + postgres + http extras)
        run: uv sync --locked --extra postgres --extra http

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      # The full suite once — includes the Hypothesis property machine
      # (tests/test_property_commit.py, -m property) under the derandomized "ci"
      # profile selected by CI=true above, plus the no-time.sleep guard applied
      # to every test (a stray test-level sleep fails here).
      - name: Test
        run: uv run pytest

      # P1.4 DoD (PLAN.md 8): raise the determinism gate to 20 CONSECUTIVE runs
      # for concurrency AND race AND crash — an intermittent failure in any of
      # these is a live P0 race (SPEC section 9/10: a flaky commit test blocks
      # merge because flakiness here means a REAL race, never noise). Was 10x in
      # P1.1/P1.3; P1.4 doubles it and adds the crash leg.
      - name: Concurrency suite x20
        run: |
          for i in $(seq 1 20); do
            echo "--- concurrency run $i/20"
            uv run pytest -m concurrency || exit 1
          done

      - name: Race suite x20
        run: |
          for i in $(seq 1 20); do
            echo "--- race run $i/20"
            uv run pytest -m race || exit 1
          done

      - name: Crash suite x20
        run: |
          for i in $(seq 1 20); do
            echo "--- crash run $i/20"
            uv run pytest -m crash || exit 1
          done

      # The Hypothesis property machine, run several extra times under the
      # derandomized CI profile as its own leg so a determinism regression in the
      # property layer (I1-I5) is caught even if the single Test run above passed
      # by luck of ordering. Kept to a few consecutive runs (the property budget
      # is minutes, not tens of minutes — PLAN.md 8); the nightly profile
      # (documented in conftest) explores the large-example space on a cron.
      - name: Property suite x3 (derandomized)
        run: |
          for i in $(seq 1 3); do
            echo "--- property run $i/3"
            uv run pytest -m property || exit 1
          done
