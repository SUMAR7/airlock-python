name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # PLAN.md section 3.1: "a CI test imports `airlock` with extras uninstalled
  # to enforce the import-light core". This job is the environment where a
  # stray module-level sqlalchemy/httpx import in ANY base module fails hard —
  # the postgres job below can never catch that, because extras are installed
  # there.
  core-import-light:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (dev group, NO extras)
        run: uv sync --locked

      - name: Assert extras are really absent
        run: |
          if uv run python -c "import sqlalchemy" 2>/dev/null; then
            echo "sqlalchemy is installed — this job must run without extras"; exit 1
          fi
          if uv run python -c "import httpx" 2>/dev/null; then
            echo "httpx is installed — this job must run without extras"; exit 1
          fi

      - name: Import-light guard + package-surface tests (core deps only)
        run: uv run pytest tests/test_scaffold.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: airlock
          POSTGRES_PASSWORD: airlock
          POSTGRES_DB: airlock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://airlock:airlock@localhost:5432/airlock_test
      # Select the derandomized Hypothesis "ci" profile (tests/conftest.py):
      # derandomize=True + a fixed max_examples + deadline=None, so a red
      # property run is a REAL bug and never dice (PLAN.md 7 / P1.4 deliverable 4).
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The postgres extra runs the ledger suite against the postgres:16
      # service; the http extra (httpx) runs the P3.4 HttpApprovalTransport
      # suite against a fake in-process control plane (httpx.MockTransport). The
      # extras-UNINSTALLED enforcement of the import-light core (base import and
      # the httpx-free webhook receiver) lives in the core-import-light job above.
      - name: Sync dependencies (dev group + postgres + http extras)
        run: uv sync --locked --extra postgres --extra http

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      # The full suite once — runs the store-backed suites on BOTH backends
      # (P4.1: the `matrix`-marked files fan out over postgres + sqlite), the
      # Hypothesis property machine (both backends, -m property) under the
      # derandomized "ci" profile selected by CI=true above, plus the
      # no-time.sleep guard applied to every test.
      - name: Test (both backends)
        run: uv run pytest

      # P1.4 DoD (PLAN.md 8): the determinism gate is 20 CONSECUTIVE runs for
      # concurrency AND race AND crash — an intermittent failure is a live P0
      # race (SPEC section 9/10). Scoped to the POSTGRES leg here (`-k postgres`)
      # so this job's budget is unchanged; the sqlite legs get their own 20x gate
      # in the postgres-free `test-sqlite` job below (P4.1).
      - name: Concurrency suite x20 (postgres)
        run: |
          for i in $(seq 1 20); do
            echo "--- concurrency run $i/20"
            uv run pytest -m concurrency -k postgres || exit 1
          done

      - name: Race suite x20 (postgres)
        run: |
          for i in $(seq 1 20); do
            echo "--- race run $i/20"
            uv run pytest -m race || exit 1
          done

      - name: Crash suite x20 (postgres)
        run: |
          for i in $(seq 1 20); do
            echo "--- crash run $i/20"
            uv run pytest -m crash -k postgres || exit 1
          done

      - name: Property suite x3 (postgres, derandomized)
        run: |
          for i in $(seq 1 3); do
            echo "--- property run $i/3"
            uv run pytest -m property -k "not sqlite" || exit 1
          done

  # P4.1: the SQLite store passes the FULL Section-9 matrix on a SINGLE HOST with
  # NO Postgres server — this job proves exactly that. It installs sqlalchemy
  # (only for the test-side raw reads; the store itself is stdlib sqlite3) but
  # starts NO postgres service, and runs ONLY the sqlite matrix legs (`-k
  # sqlite`). The determinism gate (concurrency/crash/property x consecutive
  # runs) is the same brutal gate the postgres job applies — a flake here is a
  # real race in the sqlite store. SQLite is fast, so this stays cheap.
  test-sqlite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    env:
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      # sqlalchemy (the postgres extra) backs the test-side raw reads only; the
      # SqliteStore under test uses stdlib sqlite3 and needs no extra. NO postgres
      # service is provisioned — the sqlite leg must be server-free.
      - name: Sync dependencies (dev group + postgres + http extras)
        run: uv sync --locked --extra postgres --extra http

      # The full sqlite matrix once (correctness on the single-host store).
      - name: Test (sqlite matrix, no postgres server)
        run: uv run pytest -k sqlite

      - name: Concurrency suite x20 (sqlite)
        run: |
          for i in $(seq 1 20); do
            echo "--- sqlite concurrency run $i/20"
            uv run pytest -m concurrency -k sqlite || exit 1
          done

      - name: Crash suite x20 (sqlite)
        run: |
          for i in $(seq 1 20); do
            echo "--- sqlite crash run $i/20"
            uv run pytest -m crash -k sqlite || exit 1
          done

      - name: Property suite x3 (sqlite, derandomized)
        run: |
          for i in $(seq 1 3); do
            echo "--- sqlite property run $i/3"
            uv run pytest -m property -k sqlite || exit 1
          done
