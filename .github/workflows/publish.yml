name: Publish (TestPyPI)

# Manual-only. The real-PyPI release is release.yml (on v* tags); this is an
# opt-in TestPyPI smoke run from the Actions tab so a tag never double-publishes.
# NOTE: needs an `airlock-sdk` pending publisher registered on TestPyPI to work
# (the original TestPyPI publisher was under the old `airlock` dist name).
on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to TestPyPI (trusted publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
