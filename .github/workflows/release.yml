name: Release

# Publishes airlock-sdk to PyPI via GitHub trusted publishing (OIDC — no API
# token). Fires ONLY when a v* tag is pushed, so publishing is a deliberate act:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# The tag must match the version in pyproject.toml (guarded below). The PyPI
# trusted publisher for this to succeed: repo SUMAR7/airlock-python, workflow
# release.yml, environment `pypi`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC: trusted publishing, no stored API token

    steps:
      - uses: actions/checkout@v4

      - name: Verify the tag matches the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          echo "tag=$TAG  pyproject=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::tag v$TAG does not match pyproject version $VER"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build sdist and wheel
        run: uv build

      - name: Check metadata renders on PyPI
        run: uvx twine check dist/*

      - name: Publish to PyPI (trusted publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
